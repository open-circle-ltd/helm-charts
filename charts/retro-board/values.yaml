# Values are passed through to the base chart under the "retro-board" key (alias).
# See: charts/rails-app-with-database/values.yaml for all available options.

retro-board:
  fullnameOverride: ""

  web:
    replicasCount: 1
    image:
      # repository: SET-WHEN-USING
      # tag: auto fall back to appVersion Value
      pullPolicy: IfNotPresent
      pullSecret: "set-to-pull-secret"
    service:
      type: ClusterIP
      internalPort: 3000
    metrics:
      service:
        type: ClusterIP
        internalPort: 9393

  sidekiq:
    defaultWorker:
      enabled: true

  envConfig: {}
  #  envConfig:
  #    LOG_LEVEL: "info"
  #    RAILS_ENV: "production"
  #    SECRET_KEY_BASE: "change-me"
  #    SENTRY_DSN: "YOUR-DSN-URL"
  #    SENTRY_ENVIRONMENT: "production"
  #    SENTRY_RELEASE: "my-app@undefined"
  #    SENTRY_TRACES_SAMPLE_RATE: 1
  #    DATABASE_URL: "postgres://user:pass@host:5432/dbname"
  #    DOMAIN_NAME: "example.com"
  #    RAILS_SERVE_STATIC_FILES: "true"

  ingress:
    enabled: false
    annotations: {}
    hosts: []
    tls: []
  #  Example:
  #  enabled: true
  #  annotations:
  #    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  #  hosts:
  #    - "example.com"
  #  tls:
  #    - secretName: "example-com-tls-secret"
  #      hosts:
  #        - "example.com"

valkey:
  enabled: false
  auth:
    enabled: false
